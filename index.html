<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Leader System</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:20px}
input,button{margin:5px;padding:6px}
.card{background:#1e293b;padding:12px;margin:10px 0;border-radius:8px}
button{cursor:pointer}
</style>
</head>
<body>
<h2>🔐 Вхід</h2>
<div id="status"></div>
<div id="app" style="display:none;">
  <h3 id="user"></h3>
  <button id="logoutBtn">Вийти</button>
  <h2>👑 Лідери</h2>
  <div id="leaders"></div>
</div>
<script>
// ====== INIT OWNER ======
function ensureOwner(){
  let users = JSON.parse(localStorage.getItem("users")) || [];

  if(!users.find(u => u.login === "Octavian")){
    users.push({
      login: "Octavian",
      password: "30072002",
      role: "owner"
    });
    localStorage.setItem("users", JSON.stringify(users));
  }
}

// ====== LOGIN ======
function loginUser(){
  const l = document.getElementById("login").value.trim();
  const p = document.getElementById("password").value.trim();

  const users = JSON.parse(localStorage.getItem("users")) || [];
  const user = users.find(u => u.login === l && u.password === p);

  if(!user){
    document.getElementById("status").innerText = "❌ Невірні дані";
    return;
  }

  localStorage.setItem("currentUser", JSON.stringify(user));
  document.getElementById("status").innerText = "✅ Успішний вхід";
  showApp(user);
}

// ====== LOGOUT ======
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// ====== SHOW APP ======
function showApp(user){
  document.getElementById("app").style.display = "block";
  document.getElementById("user").innerText = user.login + " | " + user.role;
  loadLeaders();
}

// ====== AUTOLOGIN ======
function autoLogin(){
  const user = JSON.parse(localStorage.getItem("currentUser"));
  if(user){
    showApp(user);
  }
}

// ====== ЛІДЕРИ ======
function loadLeaders(){
  let leaders = JSON.parse(localStorage.getItem("leaders"));

  if(!leaders){
    leaders = [
      {org:"LSPD", name:"-", points:10, warns:0},
      {org:"FIB", name:"-", points:10, warns:0},
      {org:"EMS", name:"-", points:10, warns:0}
    ];
    localStorage.setItem("leaders", JSON.stringify(leaders));
  }

  let html = "";

  leaders.forEach((l,i)=>{
    html += `
    <div class="card">
      <b>${l.org}</b> (${l.name})<br>
      Бали: ${l.points} | Догани: ${l.warns}<br>
      <button onclick="changeLeader(${i})">Змінити</button>
      <button onclick="changePoints(${i},1)">+Бали</button>
      <button onclick="changePoints(${i},-1)">-Бали</button>
      <button onclick="changeWarn(${i},1)">+Догана</button>
      <button onclick="changeWarn(${i},-1)">-Догана</button>
    </div>
    `;
  });

  document.getElementById("leaders").innerHTML = html;
}

// ====== ЗМІНА ЛІДЕРА ======
function changeLeader(i){
  let leaders = JSON.parse(localStorage.getItem("leaders"));
  const name = prompt("Новий лідер:");

  if(!name) return;

  leaders[i].name = name;
  leaders[i].points = 10;
  leaders[i].warns = 0;

  localStorage.setItem("leaders", JSON.stringify(leaders));
  loadLeaders();
}

// ====== БАЛИ ======
function changePoints(i,val){
  let leaders = JSON.parse(localStorage.getItem("leaders"));

  leaders[i].points += val;
  if(leaders[i].points > 10) leaders[i].points = 10;
  if(leaders[i].points < 0) leaders[i].points = 0;

  localStorage.setItem("leaders", JSON.stringify(leaders));
  loadLeaders();
}

// ====== ДОГАНИ ======
function changeWarn(i,val){
  let leaders = JSON.parse(localStorage.getItem("leaders"));

  leaders[i].warns += val;
  if(leaders[i].warns < 0) leaders[i].warns = 0;

  localStorage.setItem("leaders", JSON.stringify(leaders));
  loadLeaders();
}

// ====== EVENTS ======
document.getElementById("loginBtn").addEventListener("click", loginUser);
document.getElementById("logoutBtn").addEventListener("click", logout);

// ====== INIT ======
ensureOwner();
autoLogin();
</script>
</body>
</html>
:::
