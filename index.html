<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Leader Panel</title>
</head>
<body>

<h2>Авторизація</h2>

<script async src="https://telegram.org/js/telegram-widget.js?22"
 data-telegram-login="LeaderUG5Bot"
 data-size="large"
 data-request-access="write"
 data-onauth="onTelegramAuth(user)">
</script>

<div id="app" style="display:none;">
  <h3 id="user"></h3>

  <button onclick="createTicket()">Створити тікет</button>

  <div id="tickets"></div>
</div>

<script>
  function onTelegramAuth(user) {
    console.log("Telegram user:", user);

    // 👉 Показуємо інтерфейс
    document.getElementById("app").style.display = "block";

    // 👉 Виводимо ім'я
    document.getElementById("user").innerText =
      "Привіт, " + user.first_name + (user.last_name ? " " + user.last_name : "");

    // 👉 Відправляємо дані на сервер
    fetch("/auth/telegram", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(user)
    })
    .then(res => res.json())
    .then(data => {
      console.log("Server response:", data);
    })
    .catch(err => {
      console.error("Auth error:", err);
    });
  }

  function createTicket() {
    const ticketsDiv = document.getElementById("tickets");

    const ticket = document.createElement("div");
    ticket.innerText = "🎫 Новий тікет створено: " + new Date().toLocaleString();

    ticketsDiv.appendChild(ticket);
  }
</script>

<script type="module" src="app.js"></script>

</body>
</html>
