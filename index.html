<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leader System ULTIMATE</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:20px;
}

h2{
  border-bottom:1px solid #334155;
  padding-bottom:5px;
}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

button{
  margin:4px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#3b82f6;
  color:#fff;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

input,select{
  margin:5px;
  padding:6px;
  border-radius:6px;
  border:none;
}
</style>

</head>
<body>

<h2>🔐 Вхід</h2>
<input id="login" placeholder="Логін"><br>
<input id="password" type="password" placeholder="Пароль"><br>
<button onclick="loginUser()">Увійти</button>

<div id="app" style="display:none;">

<h3 id="user"></h3>
<button onclick="logout()">Вийти</button>

<h2>👑 Лідери</h2>
<div id="leaders"></div>

<h2>🎫 Тікети</h2>
<button onclick="createTicket()">Створити</button>
<div id="tickets"></div>

<h2>📊 Онлайн</h2>
<select id="orgSelect" onchange="loadOnline()"></select>
<div id="online"></div>

<h2>⚙️ Адмін панель</h2>
<div id="admin"></div>

<h2>📜 Логи</h2>
<div id="logs"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="app.js"></script>

</body>
</html>
