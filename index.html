<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Leader System ULTIMATE</title>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:20px;
}

h2{
  border-bottom:1px solid #334155;
  padding-bottom:5px;
}

.card{
  background:#1e293b;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

button{
  margin:4px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  background:#3b82f6;
  color:#fff;
  cursor:pointer;
}

button:hover{
  background:#2563eb;
}

input,select{
  margin:5px;
  padding:6px;
  border-radius:6px;
  border:none;
}
</style>

</head>
<body>


<h2>📊 Онлайн</h2>
<select id="orgSelect" onchange="loadOnline()"></select>
<div id="online"></div>

<h2>⚙️ Адмін панель</h2>
<div id="admin"></div>

<h2>📜 Логи</h2>
<div id="logs"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="app.js"></script>
<script>

// ===== INIT OWNER =====
function ensureOwner(){
  let users = JSON.parse(localStorage.getItem("users")) || [];

  if(!users.find(u=>u.login==="Octavian")){
    users.push({
      login:"Octavian",
      password:"30072002",
      role:"owner"
    });
  }

  localStorage.setItem("users", JSON.stringify(users));
}

// ===== LOGIN =====
function loginUser(){
  let l = document.getElementById("login").value;
  let p = document.getElementById("password").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let user = users.find(u => u.login === l && u.password === p);

  if(!user){
    document.getElementById("status").innerHTML = "❌ Невірні дані";
    return;
  }

  localStorage.setItem("currentUser", JSON.stringify(user));

  document.getElementById("status").innerHTML = "✅ Успішний вхід";

  showApp(user);
}

// ===== LOGOUT =====
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// ===== SHOW APP =====
function showApp(user){
  document.getElementById("app").style.display = "block";
  document.getElementById("user").innerText =
    user.login + " | " + user.role;

  loadLeaders();
}

// ===== AUTOLOGIN =====
function autoLogin(){
  let user = JSON.parse(localStorage.getItem("currentUser"));
  if(user){
    showApp(user);
  }
}

// ===== ЛІДЕРИ =====
function loadLeaders(){
  let leaders = JSON.parse(localStorage.getItem("leaders"));

  if(!leaders){
    leaders = [
      {org:"LSPD", name:"-", points:10, warns:0},
      {org:"FIB", name:"-", points:10, warns:0},
      {org:"EMS", name:"-", points:10, warns:0}
    ];
    localStorage.setItem("leaders", JSON.stringify(leaders));
  }

  let html = "";

  leaders.forEach((l,i)=>{
    html += `
    <div class="card">
      <b>${l.org}</b> (${l.name})<br>
      Бали: ${l.points} | Догани: ${l.warns}<br>

      <button onclick="changeLeader(${i})">Змінити лідера</button>
      <button onclick="changePoints(${i},1)">+Бали</button>
      <button onclick="changePoints(${i},-1)">-Бали</button>
      <button onclick="changeWarn(${i},1)">+Догана</button>
      <button onclick="changeWarn(${i},-1)">-Догана</button>
    </div>
    `;
  });

  document.getElementById("leaders").innerHTML = html;
}

// ===== ЗМІНА ЛІДЕРА =====
function changeLeader(i){
  let leaders = JSON.parse(localStorage.getItem("leaders"));

  let name = prompt("Новий лідер:");

  if(!name) return;

  leaders[i].name = name;
  leaders[i].points = 10; // обнулення до 10
  leaders[i].warns = 0;

  localStorage.setItem("leaders", JSON.stringify(leaders));

  loadLeaders();
}

// ===== БАЛИ =====
function changePoints(i,val){
  let leaders = JSON.parse(localStorage.getItem("leaders"));

  leaders[i].points += val;

  if(leaders[i].points > 10) leaders[i].points = 10;
  if(leaders[i].points < 0) leaders[i].points = 0;

  localStorage.setItem("leaders", JSON.stringify(leaders));

  loadLeaders();
}

// ===== ДОГАНИ =====
function changeWarn(i,val){
  let leaders = JSON.parse(localStorage.getItem("leaders"));

  leaders[i].warns += val;

  if(leaders[i].warns < 0) leaders[i].warns = 0;

  localStorage.setItem("leaders", JSON.stringify(leaders));

  loadLeaders();
}

// ===== INIT =====
ensureOwner();
autoLogin();

</script>
</body>
</html>
