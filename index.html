<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Leader Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .hidden { display: none !important; }
        .btn-primary { background: linear-gradient(135deg, #2563eb, #1d4ed8); transition: all 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div id="login-screen" class="max-w-md mx-auto mt-20 p-8 card shadow-2xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Вхід</h2>
            <p class="text-slate-400 mt-2">Панель лідерів State</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Логін</label>
                <input type="text" id="username" class="w-full p-3 rounded-lg bg-slate-800 text-white border border-slate-700 outline-none focus:border-blue-500" placeholder="Octavian">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Пароль</label>
                <input type="password" id="password" class="w-full p-3 rounded-lg bg-slate-800 text-white border border-slate-700 outline-none focus:border-blue-500" placeholder="••••••••">
            </div>
            <button onclick="handleLogin()" class="w-full btn-primary p-3 rounded-lg font-bold text-white shadow-lg mt-4">Увійти</button>
        </div>
    </div>

    <div id="dashboard" class="hidden max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-white tracking-tight">STATE DASHBOARD</h1>
                <p id="user-welcome" class="text-slate-400 font-medium"></p>
            </div>
            <div class="flex items-center gap-4 bg-slate-800 p-2 rounded-xl border border-slate-700">
                <div class="px-3 text-right border-r border-slate-700">
                    <p id="user-display-name" class="font-bold text-sm text-white"></p>
                    <span id="user-role-badge" class="text-[10px] uppercase font-black text-blue-400 tracking-wider"></span>
                </div>
                <button onclick="logout()" class="text-red-400 hover:text-red-300 px-4 py-2 text-sm font-bold transition-all">Вийти</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-3">
                <div id="org-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
            </div>
            
            <div id="admin-panel" class="hidden space-y-6">
                <div class="card p-6 border-blue-500/30 bg-blue-500/5">
                    <h3 class="text-sm font-bold mb-4 text-blue-400 uppercase tracking-widest">Адмін-панель</h3>
                    <div class="space-y-2">
                        <button onclick="alert('У розробці')" class="w-full text-left bg-slate-800 p-3 rounded-lg text-[11px] hover:bg-slate-700 border border-slate-700 transition-colors">👤 СТВОРИТИ АКАУНТ</button>
                        <button onclick="alert('У розробці')" class="w-full text-left bg-slate-800 p-3 rounded-lg text-[11px] hover:bg-slate-700 border border-slate-700 transition-colors">🔑 ВИДАТИ РОЛЬ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="card w-full max-w-md p-8 shadow-2xl">
            <h3 id="modal-title" class="text-2xl font-bold mb-6 text-white border-b border-slate-700 pb-2"></h3>
            <div id="modal-content" class="grid grid-cols-1 gap-4"></div>
            <div class="flex justify-end mt-8">
                <button onclick="closeModal()" class="px-6 py-2 text-slate-400 hover:text-white font-medium transition-colors">Закрити</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
